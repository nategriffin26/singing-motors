[serial]
port = "/dev/cu.usbserial-0001"
baudrate = 921600
timeout_s = 0.20
write_timeout_s = 0.20
retries = 3

[hardware]
connected_motors = 6

[instrument]
profile = "profiles/default_instrument.toml"

[pipeline]
idle_mode = "idle"
overflow_mode = "steal_quietest"
min_freq_hz = 10.0
max_freq_hz = 800
auto_transpose = true
sticky_gap_ms = 50
double_melody = false
lookahead_ms = 2000
lookahead_strategy = "p95"
lookahead_min_ms = 400
lookahead_percentile = 95
lookahead_min_segments = 24

[homing]
auto_home = false
steps_per_rev = 800
home_start_hz = 120.0
home_hz = 160.0
home_accel_hz_per_s = 240.0

[warmups]
sequence = [
  "slot_machine_lock_in",
  "domino_ripple",
  "turbine_spool_up",
  "center_splash",
  "phase_alignment",
  "chord_bloom",
]
require_home_before_sequence = true
motor_order = [4, 2, 1, 3, 0, 5]
max_accel_hz_per_s = 180.0

[playback]
startup_countdown_s = 0
flip_direction_on_note_change = true
suppress_tight_direction_flips = true
direction_flip_cooldown_ms = 150.0
direction_flip_safety_margin_ms = 50.0
run_accel_hz_per_s = 8000.0
launch_start_hz = 60.0
launch_accel_hz_per_s = 5000.0
launch_crossover_hz = 180.0

[ui]
host = "127.0.0.1"
port = 8765
static_dir = "ui/dashboard/dist"
theme = "neon"
color_mode = "frequency_bands"
show_controls = false
sync_offset_ms = 0.0
verbose = false
